spring.application.name=app-auth-api

# Segredo JWT — em produção, mova para variável de ambiente: ${JWT_SECRET}
jwt.secret=jW5vunRAcuQc569wdaft0tTsdhSQcvZ89KNbJ5bnFVc=

# Banco de dados — em produção, use variáveis de ambiente
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hermecarddb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:NeverEndingWar64}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# O schema agora é responsabilidade do Flyway, não do Hibernate.
# "validate" garante que as entidades JPA batem com o schema criado pelas migrations.
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.sql.init.mode=never

# Thymeleaf — cache desabilitado em desenvolvimento para facilitar live reload
spring.thymeleaf.cache=false

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.session.store-type=redis